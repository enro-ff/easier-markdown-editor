name: 部署网页到服务器

# 触发条件：推送到 main 分支时自动部署
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # ==============================================
      # 如果是纯静态网页（HTML/CSS/JS），删除下面这段
      # 如果是 Vue / React / Nuxt 等，保留并修改
      # ==============================================
      - name: 安装依赖并打包
        run: |
          npm install
          npm run build
          
      # 上传文件到服务器
      - name: 部署到远程服务器
        uses: cross-the-world/ssh-scp-deploy@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: root
          pass: ${{ secrets.SERVER_PASSWORD }}
          connect_timeout: 30s
          local_path: ./dist/*
          remote_path: /var/www/website/
          # 上传目录：dist 是打包目录 /var/www/website 是服务器网站目录
          script: |
            rsync -avz --delete ./dist/ root@${{ secrets.SERVER_HOST }}:/var/www/website/
