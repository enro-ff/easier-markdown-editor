name: 部署网页到服务器

# 触发条件：推送到 main 分支时自动部署
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # ==============================================
      # 如果是纯静态网页（HTML/CSS/JS），删除下面这段
      # 如果是 Vue / React / Nuxt 等，保留并修改
      # ==============================================
      - name: 安装依赖并打包
        run: |
          npm install
          npm run build
          
      # 上传文件到服务器
      - name: 部署到远程服务器
        uses: appleboy/ssh-action@master
        with:
          # ========== 必须修改这 4 个参数 ==========
          host: ${{ secrets.SERVER_HOST }}       # 服务器 IP
          username: ${{ secrets.SERVER_USER }}   # 服务器用户名（root 或 ubuntu）
          key: ${{ secrets.SERVER_SSH_KEY }}     # 服务器私钥
          # 上传目录：dist 是打包目录 /var/www/xxx 是服务器网站目录
          script: |
            rsync -avz --delete ./dist/ root@${{ secrets.SERVER_HOST }}:/var/www/你的网站目录/
